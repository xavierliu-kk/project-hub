services:
  - type: web
    name: kkday-project-hub
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: project-hub-db
          property: connectionString

databases:
  - name: project-hub-db
    plan: free
